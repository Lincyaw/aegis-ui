name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Lint CSS
        run: pnpm lint:css

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Verify dist artifacts
        run: |
          test -f packages/ui/dist/index.js
          test -f packages/ui/dist/index.cjs
          test -f packages/ui/dist/index.d.ts
          test -f packages/ui/dist/style.css

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Console binary smoke build
        run: pnpm -F @lincyaw/console bundle:host

      - name: Console binary smoke test
        run: |
          ./apps/console/bin/aegis-console --version
          ./apps/console/bin/aegis-console --port 13399 &
          PID=$!
          sleep 2
          curl -fs http://127.0.0.1:13399/healthz
          curl -fs -o /dev/null -w 'index=%{http_code}\n' http://127.0.0.1:13399/
          curl -fs -o /dev/null -w 'spa=%{http_code}\n' http://127.0.0.1:13399/trajectories/abc
          ls -lh apps/console/bin/aegis-console
          kill $PID
